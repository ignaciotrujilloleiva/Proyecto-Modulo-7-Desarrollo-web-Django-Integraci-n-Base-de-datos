{% extends 'wallet/base.html' %}

{% block title %}Formulario de Usuario{% endblock %}

{% block content %}
<div class="transactions-container">

    <!-- Tarjeta principal del formulario -->
    <div class="card card-base form-card shadow-lg p-4">

        <!-- Título -->
        <h2 class="title">Formulario de Usuario</h2>

        <!-- Formulario -->
        <form method="post" class="custom-form">
            {% csrf_token %}

            <!-- Campo: nombre -->
            <div class="form-group-custom">
                <label for="{{ form.nombre.id_for_label }}">Nombre</label>
                {{ form.nombre }}
            </div>

            <!-- Campo: correo -->
            <div class="form-group-custom">
                <label for="{{ form.correo.id_for_label }}">Correo</label>
                {{ form.correo }}
            </div>

            <!-- Campo: saldo -->
            <div class="form-group-custom">
                <label for="{{ form.saldo.id_for_label }}">Saldo</label>
                {{ form.saldo }}
            </div>

            <!-- Botones de acción -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>
                <a href="{% url 'usuario_list' %}" class="btn btn-secondary">
                    Volver
                </a>
            </div>
        </form>

    </div>

</div>
{% endblock %}
