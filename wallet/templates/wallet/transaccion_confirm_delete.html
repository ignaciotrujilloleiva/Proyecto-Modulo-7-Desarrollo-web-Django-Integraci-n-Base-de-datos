{% extends 'wallet/base.html' %}

{% block title %}Eliminar Transacción{% endblock %}

{% block content %}
<div class="transactions-container">

    <div class="card card-base form-card shadow-lg p-4 text-center">

        <!-- Título -->
        <h2>Eliminar Transacción</h2>

        <!-- Mensaje -->
        <p class="delete-message">
            ¿Estás seguro de que deseas eliminar esta transacción?
        </p>

        <!-- Formulario -->
        <form method="post">
            {% csrf_token %}

            <div class="form-actions justify-content-center">

                <!-- Botón eliminar -->
                <button type="submit" class="btn btn-danger">
                    Sí, eliminar
                </button>

                <!-- Botón cancelar -->
                <a href="{% url 'transaccion_list' %}" class="btn btn-secondary">
                    Cancelar
                </a>

            </div>
        </form>

    </div>

</div>
{% endblock %}
