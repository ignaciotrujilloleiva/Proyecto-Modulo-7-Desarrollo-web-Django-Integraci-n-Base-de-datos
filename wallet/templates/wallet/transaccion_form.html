{% extends 'wallet/base.html' %}

{% block title %}Formulario de Transacción{% endblock %}

{% block content %}
<div class="transactions-container">

    <div class="card card-base form-card shadow-lg p-4">
        <h2 class="title">Formulario de Transacción</h2>

        <form method="post" class="custom-form">
            {% csrf_token %}

            <div class="form-group-custom">
                <label for="{{ form.usuario.id_for_label }}">Usuario</label>
                {{ form.usuario }}
            </div>

            <div class="form-group-custom">
                <label for="{{ form.moneda.id_for_label }}">Moneda</label>
                {{ form.moneda }}
            </div>

            <div class="form-group-custom">
                <label for="{{ form.monto.id_for_label }}">Monto</label>
                {{ form.monto }}
            </div>

            <div class="form-group-custom">
                <label for="{{ form.tipo_transaccion.id_for_label }}">Tipo transacción</label>
                {{ form.tipo_transaccion }}
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>
                <a href="{% url 'transaccion_list' %}" class="btn btn-secondary">
                    Volver
                </a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
