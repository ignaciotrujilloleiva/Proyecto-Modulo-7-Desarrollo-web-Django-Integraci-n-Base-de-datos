{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alke Wallet{% endblock %}</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'wallet/css/style.css' %}">

</head>

<body class="background-app d-flex flex-column min-vh-100">
    <header class="header-alkewallet">
        <h1 class="text-center p-4 fw-bold">Alke Wallet</h1>
        <nav>
            <ul class="nav justify-content-center p-4">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'usuario_list' %}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'transaccion_list' %}">Transacciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/">Admin</a>
                </li>
            </ul>
        </nav>
        
    </header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
        {% block content %}
        {% endblock %}
    </main>
    <footer class="footer-alkewallet">
        <div class="container">
            <span>&copy; 2026 Alke Wallet. Todos los derechos reservados.</span>
        </div>
    </footer>
</body>

</html>
