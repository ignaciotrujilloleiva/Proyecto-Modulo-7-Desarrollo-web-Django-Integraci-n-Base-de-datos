{% extends 'wallet/base.html' %}

{% block title %}Eliminar Usuario{% endblock %}

{% block content %}
<div class="transactions-container">

    <!-- Tarjeta reutilizable (mismo estilo que formularios y transacciones) -->
    <div class="card card-base form-card shadow-lg p-4 text-center">

        <!-- Título -->
        <h2 class="title text-danger">Eliminar Usuario</h2>

        <!-- Mensaje dinámico -->
        <p class="delete-message">
            ¿Estás seguro de que deseas eliminar a 
            <strong>"{{ object.nombre }}"</strong>?
        </p>

        <!-- Formulario -->
        <form method="post">
            {% csrf_token %}

            <!-- Botones centrados -->
            <div class="form-actions justify-content-center">

                <!-- Botón eliminar -->
                <button type="submit" class="btn btn-danger">
                    Sí, eliminar
                </button>

                <!-- Botón cancelar -->
                <a href="{% url 'usuario_list' %}" class="btn btn-secondary">
                    Cancelar
                </a>

            </div>
        </form>

    </div>

</div>
{% endblock %}
